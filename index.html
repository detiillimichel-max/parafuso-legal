<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Nut Sort</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div id="home" class="screen active">
    <div class="home-logo">🔩 Nut Sort</div>
    <div class="home-sub">Ordene as porcas por cor!</div>
    <button class="btn-primary" id="btnPlay">JOGAR</button>
  </div>

  <div id="levelSelect" class="screen">
    <div class="ls-header"><button class="gh-back" id="lsBack">‹</button><div class="ls-title">Fácil</div></div>
    <div class="ls-grid" id="lsGrid"></div>
  </div>

  <div id="game" class="screen">
    <div class="game-header">
      <button class="gh-back" id="ghBack">‹</button>
      <div class="gh-center"><div class="gh-diff" id="ghDiff">MÉDIO</div><div class="gh-level" id="ghLevel">Nível 1</div></div>
      <button class="gh-reset" id="ghReset">↻</button>
    </div>
    <div class="game-board" id="gameBoard"></div>
    <div class="game-bottom">
      <button class="gb-btn" id="btnUndo"><div class="gb-circle">↩</div><span>Desfazer</span></button>
      <button class="gb-btn" id="btnHint"><div class="gb-circle">💡<div class="gb-badge" id="hintBadge">2</div></div><span>Dica</span></button>
      <button class="gb-btn" id="btnAdd"><div class="gb-circle">＋</div><span>Adicionar</span></button>
    </div>
    <div id="winOverlay"><div class="win-title">BRILHA!</div><button class="btn-primary" id="btnNext">PRÓXIMO</button></div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
