<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nut Sort – Ordene os Parafusos</title>
<meta name="description" content="Jogo de puzzle: ordene as porcas por cor nos parafusos!">
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1e1a3a;
    --bg2: #2a2550;
    --panel: #13112b;
    --accent: #f5a623;
    --accent2: #e83e8c;
    --text: #ffffff;
    --btn-undo: #f5a623;
    --btn-hint: #f5a623;
    --btn-add: #f5a623;
    --radius: 16px;
    --bolt: #b0b0b0;
    --bolt-tip: #e8e8e8;
    --base: #888;
    --shadow: rgba(0,0,0,0.5);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    overflow: hidden;
    touch-action: manipulation;
    user-select: none;
  }

  #app {
    display: flex; flex-direction: column;
    width: 100%; height: 100%;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; width: 100%; height: 100%; position: absolute; inset: 0; }
  .screen.active { display: flex; }

  /* ── HOME ── */
  #home {
    background: radial-gradient(ellipse at 50% 30%, #2e2860 0%, #1e1a3a 70%);
    align-items: center; justify-content: center; gap: 24px; padding: 40px 24px;
  }
  .home-logo {
    font-size: 2.6rem; font-weight: 900; letter-spacing: 1px;
    background: linear-gradient(135deg, #ffd700, #f5a623, #ff6b6b);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-align: center; line-height: 1.1;
  }
  .home-sub { color: #a89fd8; font-size: 1rem; text-align: center; }
  .home-nuts { display: flex; gap: 10px; align-items: flex-end; margin: 8px 0; }
  .home-bolt { display: flex; flex-direction: column; align-items: center; gap: 2px; }

  .btn-primary {
    background: linear-gradient(135deg, #f5a623, #e8832a);
    color: #fff; font-size: 1.2rem; font-weight: 900;
    border: none; border-radius: 50px; padding: 16px 48px;
    cursor: pointer; box-shadow: 0 6px 24px rgba(245,166,35,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 1px;
  }
  .btn-primary:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(245,166,35,0.3); }

  .diff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
  .diff-btn {
    background: var(--bg2); border: 2px solid transparent;
    border-radius: var(--radius); padding: 16px 8px;
    cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .diff-btn .diff-label { font-size: 1rem; font-weight: 800; color: var(--text); }
  .diff-btn .diff-levels { font-size: 0.75rem; color: #a89fd8; margin-top: 2px; }
  .diff-btn:hover, .diff-btn.selected {
    border-color: var(--accent); background: #332e60;
    box-shadow: 0 0 0 2px rgba(245,166,35,0.2);
  }

  /* ── LEVEL SELECT ── */
  #levelSelect {
    background: var(--bg);
    padding: 0; flex-direction: column;
  }
  .ls-header {
    display: flex; align-items: center; gap: 12px;
    padding: 18px 20px 12px; background: var(--panel);
    border-bottom: 1px solid #2a2550;
  }
  .ls-title { font-size: 1.3rem; font-weight: 900; flex: 1; }
  .ls-grid {
    display: grid; grid-template-columns: repeat(5,1fr);
    gap: 10px; padding: 20px; overflow-y: auto; flex: 1;
  }
  .lv-btn {
    aspect-ratio: 1; border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 1rem; font-weight: 900; cursor: pointer;
    border: 2px solid transparent; transition: all 0.12s;
    position: relative;
  }
  .lv-btn.unlocked {
    background: var(--bg2); color: var(--text);
  }
  .lv-btn.unlocked:hover { border-color: var(--accent); background: #332e60; }
  .lv-btn.completed {
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    color: #fff;
  }
  .lv-btn.locked {
    background: #1a1730; color: #4a4570; cursor: not-allowed;
  }
  .lv-star { font-size: 0.6rem; position: absolute; bottom: 4px; letter-spacing: 1px; }

  /* ── GAME ── */
  #game {
    background: var(--bg);
    flex-direction: column;
  }
  .game-header {
    display: flex; align-items: center;
    padding: 14px 16px 10px; gap: 10px;
    background: var(--panel);
  }
  .gh-back {
    width: 42px; height: 42px; border-radius: 50%;
    background: #fff; display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; cursor: pointer; border: none; color: var(--accent2);
    font-weight: 900; box-shadow: 0 2px 8px var(--shadow);
    flex-shrink: 0;
  }
  .gh-center { flex: 1; text-align: center; }
  .gh-diff { font-size: 0.7rem; color: #a89fd8; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  .gh-level { font-size: 1.6rem; font-weight: 900; line-height: 1; }
  .gh-reset {
    width: 42px; height: 42px; border-radius: 50%;
    background: #fff; display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; cursor: pointer; border: none; color: var(--accent2);
    box-shadow: 0 2px 8px var(--shadow); flex-shrink: 0;
  }

  .game-board {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 10px 8px; gap: 16px; overflow: hidden;
  }
  .board-row { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }

  /* ── BOLT ── */
  .bolt-slot {
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer; transition: transform 0.15s;
    position: relative;
  }
  .bolt-slot.selected { transform: translateY(-14px); }
  .bolt-slot.hintable { animation: hint-pulse 0.6s ease-in-out 3; }

  @keyframes hint-pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .bolt-tip {
    width: 16px; height: 22px;
    background: linear-gradient(to bottom, #e0e0e0, #b0b0b0);
    border-radius: 8px 8px 4px 4px;
    box-shadow: 0 2px 6px var(--shadow);
    position: relative; z-index: 2;
    flex-shrink: 0;
  }
  .bolt-thread {
    width: 10px; background: repeating-linear-gradient(
      to bottom,
      #c0c0c0 0px, #c0c0c0 3px,
      #989898 3px, #989898 6px
    );
    flex: 1; min-height: 10px; position: relative; z-index: 1; flex-shrink: 0;
  }
  .bolt-base {
    width: 54px; height: 14px;
    background: radial-gradient(ellipse at center, #a0a0a0, #606060);
    border-radius: 50%; box-shadow: 0 4px 10px var(--shadow);
    flex-shrink: 0;
  }

  /* ── NUT ── */
  .nut {
    width: 52px; height: 24px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; position: relative; z-index: 3;
    box-shadow: 0 3px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -1px 0 rgba(0,0,0,0.3);
    transition: none; flex-shrink: 0;
    clip-path: polygon(8% 0%, 92% 0%, 100% 50%, 92% 100%, 8% 100%, 0% 50%);
  }
  .nut.anim { animation: nut-pop 0.25s ease-out; }
  @keyframes nut-pop {
    0% { transform: scale(0.8); opacity: 0.5; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  .nut-icon { font-size: 0.7rem; pointer-events: none; }

  /* color palettes */
  .nut-green  { background: linear-gradient(180deg, #4ecf5a, #27ae60, #1e8449); }
  .nut-yellow { background: linear-gradient(180deg, #f7dc6f, #f5a623, #d68910); }
  .nut-pink   { background: linear-gradient(180deg, #f78fb3, #e83e8c, #c0392b); color: #fff; }
  .nut-blue   { background: linear-gradient(180deg, #74b9ff, #3498db, #1a5276); }
  .nut-red    { background: linear-gradient(180deg, #ff7675, #e74c3c, #922b21); }
  .nut-orange { background: linear-gradient(180deg, #ffa07a, #e67e22, #a04000); }
  .nut-purple { background: linear-gradient(180deg, #a29bfe, #6c5ce7, #4a235a); }
  .nut-cyan   { background: linear-gradient(180deg, #81ecec, #00cec9, #0e6655); }

  /* ── BOTTOM BAR ── */
  .game-bottom {
    display: flex; justify-content: space-around; align-items: flex-end;
    padding: 12px 16px 20px; background: var(--panel);
    border-top: 1px solid #2a2550;
  }
  .gb-btn {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer; background: none; border: none; color: var(--text);
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.85rem;
    transition: transform 0.1s;
  }
  .gb-btn:active { transform: scale(0.92); }
  .gb-circle {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, #f5a623, #e8832a);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; box-shadow: 0 4px 16px rgba(245,166,35,0.4);
    position: relative;
  }
  .gb-badge {
    position: absolute; top: -4px; right: -4px;
    width: 22px; height: 22px; border-radius: 50%;
    background: #fff; color: #333; font-size: 0.75rem; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--accent);
  }

  /* ── WIN OVERLAY ── */
  #winOverlay {
    position: absolute; inset: 0; z-index: 100;
    background: rgba(20,16,45,0.88);
    display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
    padding: 40px 24px;
  }
  #winOverlay.show { display: flex; }
  .win-confetti { font-size: 3rem; animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .win-title {
    font-size: 2.4rem; font-weight: 900;
    background: linear-gradient(135deg, #ffd700, #f5a623);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-align: center;
  }
  .win-sub { color: #a89fd8; font-size: 1rem; text-align: center; }
  .win-stars { font-size: 2rem; letter-spacing: 6px; }
  .win-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
  .btn-secondary {
    background: var(--bg2); color: var(--text);
    border: 2px solid #332e60; border-radius: 50px;
    padding: 14px 32px; font-size: 1rem; font-weight: 800;
    cursor: pointer; font-family: 'Nunito', sans-serif;
    transition: border-color 0.15s;
  }
  .btn-secondary:hover { border-color: var(--accent); }

  /* ── TOAST ── */
  #toast {
    position: absolute; top: 80px; left: 50%; transform: translateX(-50%) translateY(-30px);
    background: #332e60; color: #fff; padding: 10px 24px;
    border-radius: 50px; font-size: 0.9rem; font-weight: 700;
    box-shadow: 0 4px 20px var(--shadow); pointer-events: none;
    opacity: 0; transition: opacity 0.2s, transform 0.2s; z-index: 200; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── PARTICLES ── */
  .particle {
    position: absolute; pointer-events: none; z-index: 50;
    border-radius: 50%; animation: float-up 1s ease-out forwards;
  }
  @keyframes float-up {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-120px) scale(0); opacity: 0; }
  }

  /* ── RESPONSIVE NUT SIZE ── */
  @media (max-height: 700px) {
    .nut { height: 20px; width: 44px; }
    .bolt-tip { width: 14px; height: 18px; }
    .bolt-base { width: 46px; height: 12px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="home" class="screen active">
    <div class="home-logo">🔩 Nut Sort</div>
    <div class="home-sub">Ordene as porcas por cor!</div>
    <div class="home-nuts">
      <div class="home-bolt">
        <div class="nut nut-green" style="width:40px;height:20px;clip-path:polygon(8% 0%,92% 0%,100% 50%,92% 100%,8% 100%,0% 50%)"></div>
        <div class="nut nut-green" style="width:40px;height:20px;clip-path:polygon(8% 0%,92% 0%,100% 50%,92% 100%,8% 100%,0% 50%)"></div>
        <div class="nut nut-green" style="width:40px;height:20px;clip-path:polygon(8% 0%,92% 0%,100% 50%,92% 100%,8% 100%,0% 50%)"></div>
      </div>
      <div class="home-bolt">
        <div class="nut nut-yellow" style="width:40px;height:20px;clip-path:polygon(8% 0%,92% 0%,100% 50%,92% 100%,8% 100%,0% 50%)"></div>
        <div class="nut nut-pink" style="width:40px;height:20px;clip-path:polygon(8% 0%,92% 0%,100% 50%,92% 100%,8% 100%,0% 50%)"></div>
        <div class="nut nut-blue" style="width:40px;height:20px;clip-path:polygon(8% 0%,92% 0%,100% 50%,92% 100%,8% 100%,0% 50%)"></div>
      </div>
      <div class="home-bolt">
        <div class="nut nut-red" style="width:40px;height:20px;clip-path:polygon(8% 0%,92% 0%,100% 50%,92% 100%,8% 100%,0% 50%)"></div>
        <div class="nut nut-orange" style="width:40px;height:20px;clip-path:polygon(8% 0%,92% 0%,100% 50%,92% 100%,8% 100%,0% 50%)"></div>
        <div class="nut nut-yellow" style="width:40px;height:20px;clip-path:polygon(8% 0%,92% 0%,100% 50%,92% 100%,8% 100%,0% 50%)"></div>
      </div>
    </div>

    <div style="width:100%">
      <div style="font-size:0.85rem;color:#a89fd8;font-weight:700;text-align:center;margin-bottom:10px;letter-spacing:1px">ESCOLHA A DIFICULDADE</div>
      <div class="diff-grid">
        <div class="diff-btn selected" data-diff="facil">
          <div style="font-size:1.4rem">😊</div>
          <div class="diff-label">Fácil</div>
          <div class="diff-levels">20 níveis</div>
        </div>
        <div class="diff-btn" data-diff="medio">

          <div class="diff-label">Difícil</div>
          <div class="diff-levels">20 níveis</div>
        </div>
        <div class="diff-btn" data-diff="expert">
          <div style="font-size:1.4rem">💀</div>

    <button class="btn-primary" id="btnPlay">JOGAR</button>

  <!-- LEVEL SELECT -->
  <div id="levelSelect" class="screen">
    <div class="ls-header">
      <button class="gh-back" id="lsBack">‹</button>
      <div class="ls-title" id="lsTitle">Fácil</div>

    <div class="ls-grid" id="lsGrid"></div>
  </div>

  <!-- GAME -->
  <div id="game" class="screen">
    <div class="game-header">
      <button class="gh-back" id="ghBack">‹</button>
      <div class="gh-center">
        <div class="gh-diff" id="ghDiff">FÁCIL</div>
        <div class="gh-level" id="ghLevel">Nível 1</div>
      </div>
      <button class="gh-reset" id="ghReset">↺</button>

    <div class="game-board" id="gameBoard"></div>

    <div class="game-bottom">
      <button class="gb-btn" id="btnUndo">

  <div id="toast"></div>

<script>
// ── COLORS ──
const COLORS = ['green','yellow','pink','blue','red','orange','purple','cyan'];
const COLOR_ICONS = {
  green:'🌿', yellow:'☀️', pink:'👑', blue:'💧',
  red:'❤️', orange:'⚡', purple:'🌙', cyan:'❄️'
};

// ── LEVEL GENERATOR ──
function generateLevel(difficulty, levelNum) {
  const cfg = {
    facil:   { bolts: 4, nutH: 3, colors: 3, extra: 1 },
    medio:   { bolts: 5, nutH: 4, colors: 4, extra: 1 },
    dificil: { bolts: 7, nutH: 4, colors: 5, extra: 2 },
    expert:  { bolts: 9, nutH: 5, colors: 6, extra: 2 },
  }[difficulty];

  const seed = difficulty.charCodeAt(0) * 31 + levelNum * 17;
  const rng = seededRng(seed);

  const colors = shuffle(COLORS.slice(), rng).slice(0, cfg.colors);
  let allNuts = [];
  colors.forEach(c => { for(let i=0;i<cfg.nutH;i++) allNuts.push(c); });

  allNuts = shuffle(allNuts, rng);

  const bolts = [];
  let idx = 0;
  for(let b=0; b<cfg.colors; b++) {
    const nuts = allNuts.slice(idx, idx + cfg.nutH);
    idx += cfg.nutH;
    bolts.push({ nuts, capacity: cfg.nutH });
  }
  // extra empty bolts
  for(let e=0; e<cfg.extra; e++) {
    bolts.push({ nuts: [], capacity: cfg.nutH });
  }

  return { bolts, colors, nutH: cfg.nutH };
}

function seededRng(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 4294967296; };
}

function shuffle(arr, rng) {
  for(let i=arr.length-1;i>0;i--) {
    const j = Math.floor(rng() * (i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

// ── SAVE STATE ──
const SAVE_KEY = 'nutsort_save';
function loadSave() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || {}; } catch { return {}; }
}
function writeSave(s) { localStorage.setItem(SAVE_KEY, JSON.stringify(s)); }

// ── APP STATE ──
let save = loadSave();
let currentDiff = 'facil';
let currentLevel = 1;
let bolts = [];
let selectedBolt = -1;
let history = [];
let moveCount = 0;
let hints = 3;
let extraBolts = 0;

const DIFF_NAMES = { facil:'Fácil', medio:'Médio', dificil:'Difícil', expert:'Expert' };
const MAX_LEVELS = 20;

// ── UI REFS ──
const $home        = document.getElementById('home');
const $levelSelect = document.getElementById('levelSelect');
const $game        = document.getElementById('game');
const $board       = document.getElementById('gameBoard');
const $winOverlay  = document.getElementById('winOverlay');
const $toast       = document.getElementById('toast');
const $ghDiff      = document.getElementById('ghDiff');
const $ghLevel     = document.getElementById('ghLevel');
const $hintBadge   = document.getElementById('hintBadge');
const $lsTitle     = document.getElementById('lsTitle');
const $lsGrid      = document.getElementById('lsGrid');
const $winStars    = document.getElementById('winStars');
const $winSub      = document.getElementById('winSub');

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── HOME ──
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentDiff = btn.dataset.diff;
  });
});

document.getElementById('btnPlay').addEventListener('click', () => {
  openLevelSelect(currentDiff);
});

// ── LEVEL SELECT ──
document.getElementById('lsBack').addEventListener('click', () => showScreen('home'));

function openLevelSelect(diff) {
  currentDiff = diff;
  $lsTitle.textContent = DIFF_NAMES[diff];
  const saved = save[diff] || {};
  $lsGrid.innerHTML = '';

  for(let i=1; i<=MAX_LEVELS; i++) {
    const btn = document.createElement('div');
    btn.className = 'lv-btn';
    const completed = saved[i];
    const unlocked = i === 1 || saved[i-1];

    if(completed) {
      btn.classList.add('completed');
      btn.innerHTML = `${i}<div class="lv-star">⭐⭐⭐</div>`;
    } else if(unlocked) {
      btn.classList.add('unlocked');
      btn.textContent = i;
    } else {
      btn.classList.add('locked');
      btn.innerHTML = `🔒`;
    }

    if(unlocked) {
      btn.addEventListener('click', () => startGame(diff, i));
    }
    $lsGrid.appendChild(btn);
  }
  showScreen('levelSelect');
}

// ── GAME ──
function startGame(diff, level) {
  currentDiff = diff;
  currentLevel = level;
  const data = generateLevel(diff, level);
  bolts = data.bolts.map(b => ({ nuts: [...b.nuts], capacity: b.capacity }));
  selectedBolt = -1;
  history = [];
  moveCount = 0;
  hints = 3;
  extraBolts = 0;
  $hintBadge.textContent = hints;
  $ghDiff.textContent = DIFF_NAMES[diff].toUpperCase();
  $ghLevel.textContent = `Nível ${level}`;
  $winOverlay.classList.remove('show');
  renderBoard();
  showScreen('game');
}

document.getElementById('ghBack').addEventListener('click', () => openLevelSelect(currentDiff));
document.getElementById('ghReset').addEventListener('click', () => startGame(currentDiff, currentLevel));
document.getElementById('btnUndo').addEventListener('click', undoMove);
document.getElementById('btnHint').addEventListener('click', doHint);
document.getElementById('btnAdd').addEventListener('click', addExtraBolt);
document.getElementById('btnNext').addEventListener('click', () => {
  if(currentLevel < MAX_LEVELS) startGame(currentDiff, currentLevel + 1);
  else openLevelSelect(currentDiff);
});
document.getElementById('btnReplay').addEventListener('click', () => startGame(currentDiff, currentLevel));
document.getElementById('btnMenu').addEventListener('click', () => showScreen('home'));

// ── RENDER ──
function renderBoard() {
  $board.innerHTML = '';

  // Split into rows
  const n = bolts.length;
  const perRow = n <= 4 ? n : Math.ceil(n / 2);
  const rows = [];
  for(let i=0; i<n; i+=perRow) rows.push(bolts.slice(i, i+perRow));

  rows.forEach((row, ri) => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'board-row';

    row.forEach((bolt, bi) => {
      const globalIdx = ri * perRow + bi;
      const slot = document.createElement('div');
      slot.className = 'bolt-slot';
      if(selectedBolt === globalIdx) slot.classList.add('selected');
      slot.dataset.idx = globalIdx;

      // nuts (top to bottom = last to first)
      const stackDiv = document.createElement('div');
      stackDiv.style.cssText = 'display:flex;flex-direction:column;align-items:center;';

      // Empty spaces
      const emptyCount = bolt.capacity - bolt.nuts.length;
      for(let e=0; e<emptyCount; e++) {
        const space = document.createElement('div');
        space.style.cssText = `height:24px;width:52px;`;
        stackDiv.appendChild(space);
      }

      // Nuts from bottom to top visual (array[0]=bottom)
      const nutsFromTop = [...bolt.nuts].reverse();
      nutsFromTop.forEach((color, ni) => {
        const nut = document.createElement('div');
        nut.className = `nut nut-${color}`;
        const icon = COLOR_ICONS[color] || '●';
        nut.innerHTML = `<span class="nut-icon">${icon}</span>`;
        stackDiv.appendChild(nut);
      });

      slot.appendChild(stackDiv);

      // Bolt visual
      const tip = document.createElement('div'); tip.className = 'bolt-tip';
      const thread = document.createElement('div'); thread.className = 'bolt-thread';
      thread.style.height = (bolt.capacity * 24 + 8) + 'px';
      const base = document.createElement('div'); base.className = 'bolt-base';

      // Wrap tip+thread behind nuts
      const boltPole = document.createElement('div');
      boltPole.style.cssText = 'display:flex;flex-direction:column;align-items:center;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:1;';
      boltPole.appendChild(tip);
      boltPole.appendChild(thread);

      slot.style.position = 'relative';
      slot.insertBefore(boltPole, slot.firstChild);
      slot.appendChild(base);

      slot.addEventListener('click', () => onBoltClick(globalIdx));
      rowDiv.appendChild(slot);
    });

    $board.appendChild(rowDiv);
  });
}

// ── GAME LOGIC ──
function onBoltClick(idx) {
  if($winOverlay.classList.contains('show')) return;

  if(selectedBolt === -1) {
    // Select if has nuts
    if(bolts[idx].nuts.length > 0) {
      selectedBolt = idx;
      renderBoard();
    }
  } else if(selectedBolt === idx) {
    // Deselect
    selectedBolt = -1;
    renderBoard();
  } else {
    // Try move
    const from = bolts[selectedBolt];
    const to = bolts[idx];

    if(canMove(from, to)) {
      pushHistory();
      const nut = from.nuts[from.nuts.length - 1];
      from.nuts.pop();
      to.nuts.push(nut);
      moveCount++;
      selectedBolt = -1;
      renderBoard();
      // animate top nut
      setTimeout(() => animateNut(idx), 10);
      checkWin();
    } else {
      // Invalid move feedback
      selectedBolt = -1;
      renderBoard();
      showToast('Não cabe! 🚫');
    }
  }
}

function canMove(from, to) {
  if(from.nuts.length === 0) return false;
  if(to.nuts.length >= to.capacity) return false;
  if(to.nuts.length === 0) return true;
  return from.nuts[from.nuts.length-1] === to.nuts[to.nuts.length-1];
}

function pushHistory() {
  history.push(bolts.map(b => ({ nuts: [...b.nuts], capacity: b.capacity })));
  if(history.length > 50) history.shift();
}

function undoMove() {
  if(history.length === 0) { showToast('Sem movimentos para desfazer'); return; }
  bolts = history.pop();
  selectedBolt = -1;
  moveCount = Math.max(0, moveCount - 1);
  renderBoard();
}

function checkWin() {
  const done = bolts.every(b => {
    if(b.nuts.length === 0) return true;
    if(b.nuts.length !== b.capacity) return false;
    return b.nuts.every(n => n === b.nuts[0]);
  });
  if(done) {
    setTimeout(showWin, 300);
  }
}

function showWin() {
  // Save progress
  if(!save[currentDiff]) save[currentDiff] = {};
  save[currentDiff][currentLevel] = true;
  writeSave(save);

  const stars = moveCount <= 10 ? '⭐⭐⭐' : moveCount <= 18 ? '⭐⭐' : '⭐';
  $winStars.textContent = stars;
  $winSub.textContent = `Nível concluído em ${moveCount} movimentos!`;

  // Update next button text
  const nextBtn = document.getElementById('btnNext');
  if(currentLevel >= MAX_LEVELS) nextBtn.textContent = 'Ver Níveis';
  else nextBtn.textContent = 'PRÓXIMO NÍVEL →';

  spawnParticles();
  $winOverlay.classList.add('show');
}

function doHint() {
  if(hints <= 0) { showToast('Sem dicas disponíveis 😢'); return; }

  // Find a valid move
  for(let f=0; f<bolts.length; f++) {
    if(bolts[f].nuts.length === 0) continue;
    for(let t=0; t<bolts.length; t++) {
      if(f === t) continue;
      if(canMove(bolts[f], bolts[t])) {
        hints--;
        $hintBadge.textContent = hints;
        // Highlight source bolt
        selectedBolt = f;
        renderBoard();
        const slots = document.querySelectorAll('.bolt-slot');
        slots[t]?.classList.add('hintable');
        setTimeout(() => {
          slots[t]?.classList.remove('hintable');
        }, 2000);
        return;
      }
    }
  }
  showToast('Nenhuma dica encontrada 🤔');
}

function addExtraBolt() {
  if(extraBolts >= 2) { showToast('Limite de parafusos extras atingido!'); return; }
  const capacity = bolts[0]?.capacity || 4;
  bolts.push({ nuts: [], capacity });
  extraBolts++;
  selectedBolt = -1;
  renderBoard();
  showToast('Parafuso extra adicionado! 🔩');
}

function animateNut(boltIdx) {
  const slots = document.querySelectorAll('.bolt-slot');
  const slot = slots[boltIdx];
  if(!slot) return;
  const nuts = slot.querySelectorAll('.nut');
  const topNut = nuts[0];
  if(topNut) { topNut.classList.add('anim'); setTimeout(() => topNut.classList.remove('anim'), 300); }
}

function spawnParticles() {
  const colors = ['#f5a623','#e83e8c','#27ae60','#3498db','#e74c3c','#ffd700','#a29bfe'];
  for(let i=0;i<30;i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 6 + Math.random() * 10;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        left:${10 + Math.random() * 80}%;
        top:${20 + Math.random() * 40}%;
        animation-duration:${0.6 + Math.random() * 0.8}s;
      `;
      $winOverlay.appendChild(p);
      setTimeout(() => p.remove(), 1500);
    }, i * 40);
  }
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $toast.classList.remove('show'), 2000);
}

// ── INIT ──
// Start with facil selected
currentDiff = 'facil';
</script>
